<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Dashboard System</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            blue: '#297ec6',
                            yellow: '#ffde17',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .resizer {
            position: absolute; right: 0; top: 0; width: 5px; height: 100%;
            cursor: col-resize; user-select: none; z-index: 21;
        }
        .resizer:hover, .resizing { border-right: 2px solid #297ec6; background: rgba(41, 126, 198, 0.1); }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 h-screen flex flex-col overflow-hidden">

    <!-- 1. TOP NAVIGATION BAR -->
    <nav class="bg-white border-b border-slate-200 px-5 py-3 flex items-center gap-3 overflow-x-auto whitespace-nowrap shadow-sm shrink-0">
        <div class="font-bold text-sm text-primary-blue mr-4 border-r-2 border-slate-200 pr-4 tracking-wide">DASHBOARD GA-CM</div>
        <button class="nav-btn bg-white border border-slate-200 px-3.5 py-2 rounded-lg text-xs font-semibold text-slate-600 hover:bg-amber-50 hover:border-primary-yellow hover:text-slate-900 transition flex items-center gap-1.5" onclick="tarikData('UTILITIES USAGE - GENERAL AFFAIRS', this)">⚡ Utilities</button>
        <button class="nav-btn bg-white border border-slate-200 px-3.5 py-2 rounded-lg text-xs font-semibold text-slate-600 hover:bg-amber-50 hover:border-primary-yellow hover:text-slate-900 transition flex items-center gap-1.5" onclick="tarikData('MONTHLY PROJECT REPORT', this)">📊 Project</button>
        <button class="nav-btn bg-white border border-slate-200 px-3.5 py-2 rounded-lg text-xs font-semibold text-slate-600 hover:bg-amber-50 hover:border-primary-yellow hover:text-slate-900 transition flex items-center gap-1.5" onclick="tarikData('Laporan Insiden BCP', this)">🚨 Insiden</button>
        <button class="nav-btn bg-white border border-slate-200 px-3.5 py-2 rounded-lg text-xs font-semibold text-slate-600 hover:bg-amber-50 hover:border-primary-yellow hover:text-slate-900 transition flex items-center gap-1.5" onclick="tarikData('FORM DATA TAMU / VISITOR', this)">👥 Tamu/Visitor</button>
        <button class="nav-btn bg-white border border-slate-200 px-3.5 py-2 rounded-lg text-xs font-semibold text-slate-600 hover:bg-amber-50 hover:border-primary-yellow hover:text-slate-900 transition flex items-center gap-1.5" onclick="tarikData('FORM PEMINJAMAN KENDARAAN DINAS & VISITOR', this)">🚗 Kendaraan</button>
        <button class="nav-btn bg-white border border-slate-200 px-3.5 py-2 rounded-lg text-xs font-semibold text-slate-600 hover:bg-amber-50 hover:border-primary-yellow hover:text-slate-900 transition flex items-center gap-1.5" onclick="tarikData('Pengambilan Barang (Office Supplies)', this)">📦 Supplies</button>
    </nav>

    <!-- 2. TOOLBAR FILTERING & EXPORT -->
    <div class="bg-white border-b border-slate-200 px-5 py-3 flex flex-wrap items-center gap-3 shrink-0" id="toolbar" style="display: none;">
        <div class="flex items-center gap-2 text-xs font-medium text-slate-600">
            <label>Mode Cari:</label>
            <select id="filterMode" class="bg-white border border-slate-300 px-3 py-1.5 rounded-lg text-xs outline-none focus:border-primary-blue focus:ring-2 focus:ring-primary-blue/20 transition" onchange="gantiModeFilter()">
                <option value="global">Cari Teks Bebas</option>
                <option value="dateRange">Rentang Tanggal</option>
            </select>
        </div>

        <div class="flex items-center gap-2" id="groupSearch">
            <input type="text" id="searchInput" class="bg-white border border-slate-300 px-3 py-1.5 rounded-lg text-xs outline-none focus:border-primary-blue focus:ring-2 focus:ring-primary-blue/20 transition w-64" placeholder="🔍 Ketik kata kunci..." oninput="terapkanFilterGlobal()">
        </div>

        <div class="flex items-center gap-2 text-xs font-medium text-slate-600" id="groupDateStart" style="display: none;">
            <label>Mulai:</label>
            <input type="date" id="dateStart" class="bg-white border border-slate-300 px-3 py-1.5 rounded-lg text-xs outline-none focus:border-primary-blue" onchange="terapkanFilterGlobal()">
        </div>
        <div class="flex items-center gap-2 text-xs font-medium text-slate-600" id="groupDateEnd" style="display: none;">
            <label>Akhir:</label>
            <input type="date" id="dateEnd" class="bg-white border border-slate-300 px-3 py-1.5 rounded-lg text-xs outline-none focus:border-primary-blue" onchange="terapkanFilterGlobal()">
        </div>
        
        <span id="rowCount" class="text-xs font-bold text-primary-blue bg-blue-50 px-3 py-1.5 rounded-full ml-2"></span>
        
        <div class="ml-auto flex items-center gap-2">
            <button class="bg-rose-500 hover:bg-rose-600 text-white font-bold px-3.5 py-1.5 rounded-lg text-xs shadow-sm transition flex items-center gap-1" onclick="eksporPDF()">📄 PDF</button>
            <button class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-3.5 py-1.5 rounded-lg text-xs shadow-sm transition flex items-center gap-1" onclick="eksporExcel()">📊 Excel</button>
        </div>
    </div>

    <!-- Panel Kolom Tersembunyi -->
    <div class="bg-slate-200 px-5 py-2 text-xs flex items-center gap-2 flex-wrap shrink-0" id="hiddenColsBar" style="display: none;">
        <span class="font-semibold text-slate-600">Kolom disembunyikan:</span>
        <div id="hiddenColsList" class="flex gap-1.5 flex-wrap"></div>
    </div>

    <!-- 3. AREA TABEL DATA -->
    <div class="flex-grow overflow-auto bg-white relative" id="tableContainer">
        <div class="flex flex-col items-center justify-center h-full text-slate-400 gap-3 p-6 text-center">
            <svg class="w-12 h-12 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            <span class="text-sm font-medium">Silakan pilih modul di menu atas untuk menampilkan database.</span>
        </div>
    </div>

    <!-- Pop-up Filter Spreadsheet Style -->
    <div id="filterPopup" class="absolute bg-white border border-slate-300 rounded-lg shadow-xl w-56 z-50 hidden flex-col text-xs">
        <div class="p-2 border-b border-slate-200">
            <input type="text" id="popupSearchInput" class="w-full px-2.5 py-1 border border-slate-300 rounded outline-none focus:border-primary-blue text-xs" placeholder="Cari filter..." oninput="cariItemPopup()">
        </div>
        <div class="px-3 py-1.5 bg-slate-50 border-b border-slate-200 flex justify-between font-medium text-primary-blue">
            <a class="cursor-pointer hover:underline" onclick="cekSemuaPopup(true)">Pilih Semua</a>
            <a class="cursor-pointer hover:underline text-slate-500" onclick="cekSemuaPopup(false)">Bersihkan</a>
        </div>
        <div class="max-h-48 overflow-y-auto py-1" id="popupListContainer"></div>
        <div class="p-2 border-t border-slate-200 bg-slate-50 flex justify-end gap-2">
            <button class="px-3 py-1 rounded border border-slate-300 bg-white hover:bg-slate-100 font-semibold text-slate-700 transition" onclick="tutupPopup()">Batal</button>
            <button class="px-3 py-1 rounded bg-emerald-700 hover:bg-emerald-800 text-white font-semibold transition" onclick="terapkanPopup()">Oke</button>
        </div>
    </div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbwPxO5P8ZRFgIndBn8XksJqzi8F6wZA8Hch-yS6-aIk8trNgmkIjhNCMWPfbA_GBcNV/exec";

    let globalHeaders = [];
    let globalRows = [];
    let currentModule = "";
    
    let currentSortCol = -1;
    let currentSortAsc = true;
    let hiddenColumns = new Set();
    let activeColFilters = {};
    let popupActiveColIndex = -1;

    document.addEventListener('click', function(event) {
        let popup = document.getElementById('filterPopup');
        if (popup.style.display === 'flex' && !popup.contains(event.target) && !event.target.classList.contains('filter-icon')) {
            tutupPopup();
        }
    });

    async function tarikData(sourceName, elemenDiklik) {
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('bg-primary-blue', 'text-white', 'shadow'));
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.add('bg-white', 'text-slate-600'));
        elemenDiklik.classList.remove('bg-white', 'text-slate-600');
        elemenDiklik.classList.add('bg-primary-blue', 'text-white', 'shadow');
        
        currentModule = sourceName;
        const tableContainer = document.getElementById("tableContainer");
        const toolbar = document.getElementById("toolbar");
        
        toolbar.style.display = "none";
        document.getElementById('hiddenColsBar').style.display = "none";
        tableContainer.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-slate-500 gap-3"><div class="w-8 h-8 border-3 border-slate-200 border-t-primary-blue rounded-full animate-spin"></div><span class="text-sm font-medium">Sinkronisasi data ${sourceName}...</span></div>`;

        document.getElementById('searchInput').value = '';
        document.getElementById('dateStart').value = '';
        document.getElementById('dateEnd').value = '';
        currentSortCol = -1;
        hiddenColumns.clear();
        activeColFilters = {};
        tutupPopup();

        try {
            let res = await fetch(`${URL_API}?source=${encodeURIComponent(sourceName)}`);
            let data = await res.json();

            if (data.error) {
                tableContainer.innerHTML = `<div class="p-10 text-center text-rose-500 font-semibold">Gagal: ${data.error}</div>`;
                return;
            }

            if (!data.rows || data.rows.length === 0) {
                tableContainer.innerHTML = `<div class="p-10 text-center text-slate-500 font-medium">Data pada modul ini masih kosong.</div>`;
                return;
            }

            globalHeaders = data.headers;
            globalRows = data.rows;

            toolbar.style.display = "flex";
            renderTabel(globalHeaders, globalRows);
            updateRowCount();

        } catch (error) {
            tableContainer.innerHTML = `<div class="p-10 text-center text-rose-500 font-semibold">Gagal terhubung ke server database.</div>`;
        }
    }

    function gantiModeFilter() {
        let mode = document.getElementById('filterMode').value;
        let sBox = document.getElementById('groupSearch');
        let dStart = document.getElementById('groupDateStart');
        let dEnd = document.getElementById('groupDateEnd');

        if (mode === 'global') {
            sBox.style.display = "flex"; dStart.style.display = "none"; dEnd.style.display = "none";
            document.getElementById('dateStart').value = ''; document.getElementById('dateEnd').value = '';
        } else {
            sBox.style.display = "none"; dStart.style.display = "flex"; dEnd.style.display = "flex";
            document.getElementById('searchInput').value = '';
        }
        terapkanFilterGlobal();
    }

    function hideColumn(index) { hiddenColumns.add(index); renderTabel(globalHeaders, globalRows); }
    function showColumn(index) { hiddenColumns.delete(index); renderTabel(globalHeaders, globalRows); }

    function renderTabel(headers, barisData) {
        const tableContainer = document.getElementById("tableContainer");
        const hiddenBar = document.getElementById('hiddenColsBar');
        const hiddenList = document.getElementById('hiddenColsList');
        
        if (hiddenColumns.size > 0) {
            hiddenBar.style.display = "flex";
            hiddenList.innerHTML = Array.from(hiddenColumns).map(idx => `<span class="bg-white border border-slate-300 px-2.5 py-0.5 rounded-full cursor-pointer font-semibold text-primary-blue hover:bg-primary-blue hover:text-white transition shadow-sm" onclick="showColumn(${idx})">➕ ${headers[idx]}</span>`).join('');
        } else {
            hiddenBar.style.display = "none";
        }

        let html = `<table class="w-full border-collapse"><thead><tr>`;
        html += `<th class="bg-slate-50 border-b-2 border-slate-300 border-r border-slate-200 px-3 py-2.5 text-center sticky top-0 z-20 w-12">
                    <div class="mb-1 text-[11px] font-bold text-slate-600">Pilih</div>
                    <input type="checkbox" id="chkAll" class="w-4 h-4 accent-primary-blue cursor-pointer" onchange="toggleCheckAll(this)" title="Pilih Semua">
                 </th>`;
        
        headers.forEach((header, index) => { 
            let isHidden = hiddenColumns.has(index);
            let displayStyle = isHidden ? "display: none;" : "";
            let filterActiveCls = activeColFilters[index] ? "text-primary-blue font-bold bg-blue-50" : "text-slate-400";

            html += `<th class="bg-slate-50 border-b-2 border-slate-300 border-r border-slate-200 px-3 py-2.5 sticky top-0 z-20 font-semibold text-slate-700 text-left" style="${displayStyle}" data-colindex="${index}">
                        <div class="flex flex-col gap-1.5">
                            <div class="flex justify-between items-start gap-2">
                                <div class="line-clamp-2 cursor-pointer flex items-center gap-1 flex-grow hover:text-primary-blue transition" title="Klik untuk mengurutkan" onclick="sortTable(${index}, this)">
                                    ${header} <span class="sort-icon text-[10px] text-slate-400 shrink-0">⇅</span>
                                </div>
                                <span class="filter-icon cursor-pointer text-xs p-0.5 rounded transition ${filterActiveCls}" onclick="bukaPopup(event, ${index})" title="Filter Kolom">▼</span>
                            </div>
                            <div class="flex justify-between items-center mt-1">
                                <button class="bg-rose-500 hover:bg-rose-600 text-white px-1.5 py-0.5 rounded text-[10px] font-bold transition shadow-sm" onclick="hideColumn(${index})">Hide</button>
                                <input type="checkbox" class="col-print-chk w-3.5 h-3.5 accent-primary-blue cursor-pointer" data-colindex="${index}" checked title="Centang untuk Ekspor">
                            </div>
                        </div>
                     </th>`; 
        });
        html += `</tr></thead><tbody id="tabelBody" class="divide-y divide-slate-200">`;

        barisData.forEach((row, originalIndex) => {
            html += `<tr id="row_${originalIndex}" class="hover:bg-sky-50/60 transition">`;
            html += `<td class="border-r border-slate-200 px-3 py-2.5 text-center"><input type="checkbox" class="row-chk w-4 h-4 accent-primary-blue cursor-pointer" onchange="highlightRow(this)"></td>`;
                     
            row.forEach((cell, colIndex) => {
                let isHidden = hiddenColumns.has(colIndex);
                let displayStyle = isHidden ? "display: none;" : "";
                let rawCell = cell !== undefined && cell !== null ? cell : '';
                
                if (typeof rawCell === 'string' && (rawCell.startsWith('http://') || rawCell.startsWith('https://'))) {
                    html += `<td class="border-r border-slate-200 px-3 py-2.5 text-xs text-slate-700" style="${displayStyle}" data-colindex="${colIndex}"><div class="line-clamp-4 break-words"><a href="${rawCell}" target="_blank" class="inline-block bg-primary-blue hover:bg-primary-yellow hover:text-slate-900 text-white px-2.5 py-1 rounded font-semibold transition shadow-sm">Berkas ↗</a></div></td>`;
                } else {
                    html += `<td class="border-r border-slate-200 px-3 py-2.5 text-xs text-slate-700" style="${displayStyle}" data-colindex="${colIndex}"><div class="line-clamp-4 break-words" title="${String(rawCell).replace(/<[^>]*>?/gm, '')}">${rawCell}</div></td>`;
                }
            });
            html += `</tr>`;
        });

        html += `</tbody></table>`;
        tableContainer.innerHTML = html;

        initResizableColumns();
        terapkanFilterGlobal(); 
    }

    function bukaPopup(event, colIndex) {
        event.stopPropagation();
        popupActiveColIndex = colIndex;
        
        let iconRect = event.target.getBoundingClientRect();
        let popup = document.getElementById('filterPopup');
        let listContainer = document.getElementById('popupListContainer');
        document.getElementById('popupSearchInput').value = '';

        let uniqueValues = [...new Set(globalRows.map(row => String(row[colIndex] || "").trim()))].sort();
        let existingFilter = activeColFilters[colIndex] || null;

        let listHtml = "";
        uniqueValues.forEach((val) => {
            let isChecked = existingFilter ? existingFilter.includes(val) : true;
            let displayVal = val === "" ? "(Kosong)" : val;
            listHtml += `<label class="flex items-center gap-2 px-3 py-1 hover:bg-slate-100 cursor-pointer">
                            <input type="checkbox" class="popup-item-chk w-3.5 h-3.5 accent-primary-blue cursor-pointer" value="${val}" ${isChecked ? 'checked' : ''}>
                            <span class="break-all text-slate-700">${displayVal}</span>
                         </label>`;
        });
        listContainer.innerHTML = listHtml;

        popup.style.top = (iconRect.bottom + window.scrollY + 5) + "px";
        let leftPos = iconRect.left + window.scrollX;
        if (leftPos + 224 > window.innerWidth) leftPos = window.innerWidth - 240;
        popup.style.left = leftPos + "px";
        popup.style.display = "flex";
    }

    function tutupPopup() {
        document.getElementById('filterPopup').style.display = "none";
    }

    function cariItemPopup() {
        let kw = document.getElementById('popupSearchInput').value.toLowerCase();
        document.querySelectorAll('#popupListContainer label').forEach(item => {
            let text = item.querySelector('span').innerText.toLowerCase();
            item.style.display = text.includes(kw) ? "flex" : "none";
        });
    }

    function cekSemuaPopup(checkState) {
        document.querySelectorAll('#popupListContainer label:not([style*="display: none"]) .popup-item-chk').forEach(chk => chk.checked = checkState);
    }

    function terapkanPopup() {
        let selectedValues = Array.from(document.querySelectorAll('.popup-item-chk:checked')).map(chk => chk.value);
        let totalUnik = new Set(globalRows.map(row => String(row[popupActiveColIndex] || "").trim())).size;

        if (selectedValues.length === totalUnik) {
            delete activeColFilters[popupActiveColIndex];
        } else {
            activeColFilters[popupActiveColIndex] = selectedValues;
        }

        tutupPopup();
        renderTabel(globalHeaders, globalRows);
    }

    function terapkanFilterGlobal() {
        let filterMode = document.getElementById('filterMode').value;
        let globalCari = document.getElementById('searchInput').value.toLowerCase();
        let dateStart = document.getElementById('dateStart').value;
        let dateEnd = document.getElementById('dateEnd').value;
        
        let dStart = dateStart ? new Date(dateStart) : null;
        let dEnd = dateEnd ? new Date(dateEnd) : null;
        if (dStart) dStart.setHours(0, 0, 0, 0);
        if (dEnd) dEnd.setHours(23, 59, 59, 999);

        let trs = document.querySelectorAll('#tabelBody tr');
        let countVisible = 0;

        trs.forEach((tr, index) => {
            let rowData = globalRows[index];
            let teksBaris = rowData.join(" ").toLowerCase();
            
            let lolosGlobal = true;
            if (filterMode === 'global') {
                if(globalCari) lolosGlobal = teksBaris.includes(globalCari);
            } else {
                if (dStart || dEnd) {
                    let cellTanggal = new Date(rowData[0]); 
                    if (!isNaN(cellTanggal.getTime())) {
                        if (dStart && cellTanggal < dStart) lolosGlobal = false;
                        if (dEnd && cellTanggal > dEnd) lolosGlobal = false;
                    }
                }
            }

            let lolosKolom = true;
            for (const [colIdx, allowedValues] of Object.entries(activeColFilters)) {
                let cellData = String(rowData[colIdx] || "").trim();
                if (!allowedValues.includes(cellData)) {
                    lolosKolom = false;
                    break;
                }
            }

            if (lolosGlobal && lolosKolom) {
                tr.style.display = "";
                countVisible++;
            } else {
                tr.style.display = "none";
                let chk = tr.querySelector('.row-chk');
                if(chk && chk.checked) {
                    chk.checked = false;
                    highlightRow(chk);
                }
            }
        });
        
        updateRowCount(countVisible);
        let chkAll = document.getElementById('chkAll');
        if(chkAll) chkAll.checked = false;
    }

    function updateRowCount(count) {
        if(count === undefined) count = document.querySelectorAll('#tabelBody tr:not([style*="display: none"])').length;
        document.getElementById('rowCount').innerText = `${count} Baris Data`;
    }

    function getCetakHTML() {
        let checkedBoxes = document.querySelectorAll('.row-chk:checked');
        if (checkedBoxes.length === 0) { alert("Pilih minimal satu baris data untuk diekspor."); return null; }

        let checkedCols = Array.from(document.querySelectorAll('.col-print-chk:checked')).map(chk => parseInt(chk.getAttribute('data-colindex'))).filter(idx => !hiddenColumns.has(idx));
        if (checkedCols.length === 0) { alert("Pilih minimal satu kolom aktif untuk diekspor."); return null; }

        let html = `<table><thead><tr>`;
        checkedCols.forEach(idx => html += `<th>${globalHeaders[idx]}</th>`);
        html += `</tr></thead><tbody>`;

        checkedBoxes.forEach(chk => {
            let tr = chk.closest('tr');
            html += `<tr>`;
            checkedCols.forEach(idx => {
                let td = tr.querySelector(`td[data-colindex="${idx}"]`);
                let cellContent = td ? (td.querySelector('.line-clamp-4') ? td.querySelector('.line-clamp-4').innerHTML : td.innerHTML) : '';
                if(cellContent.includes('<a href=')) {
                    let match = cellContent.match(/href="([^"]*)"/);
                    if(match) cellContent = match[1]; 
                }
                html += `<td>${cellContent}</td>`;
            });
            html += `</tr>`;
        });
        html += `</tbody></table>`;
        return html;
    }

    function eksporPDF() {
        let tableHtml = getCetakHTML();
        if(!tableHtml) return;

        let printWindow = window.open('', '_blank');
        let printTemplate = `
            <!DOCTYPE html><html><head><title>Print PDF - ${currentModule}</title>
            <style>
                body { font-family: 'Segoe UI', sans-serif; font-size: 11px; padding: 20px; color: #000; }
                h2 { text-align: center; margin-bottom: 5px; text-transform: uppercase; }
                .meta { text-align: center; margin-bottom: 25px; color: #555; font-size: 12px; }
                table { width: 100%; border-collapse: collapse; }
                th, td { border: 1px solid #000; padding: 6px; text-align: left; vertical-align: top; word-break: break-word; }
                th { background-color: #f0f0f0; font-weight: bold; }
                @media print { @page { size: landscape; margin: 15mm; } }
            </style></head><body>
            <h2>Laporan Operasional</h2>
            <div class="meta">Modul: <strong>${currentModule}</strong> | Dicetak: ${new Date().toLocaleString('id-ID')}</div>
            ${tableHtml}
            <script> window.onload = function() { window.print(); }; <\/script>
            </body></html>
        `;
        printWindow.document.write(printTemplate);
        printWindow.document.close();
    }

    function eksporExcel() {
        let tableHtml = getCetakHTML();
        if(!tableHtml) return;

        let excelTemplate = `
            <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
            <head><meta charset="UTF-8"><style>table {border-collapse: collapse;} th, td {border: 1px solid black; padding: 5px;}</style></head>
            <body>
                <h3>Modul: ${currentModule}</h3>
                ${tableHtml}
            </body></html>
        `;

        let blob = new Blob([excelTemplate], { type: 'application/vnd.ms-excel' });
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url;
        a.download = `Data_${currentModule.replace(/\s+/g, '_')}_${new Date().getTime()}.xls`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    function sortTable(colIndex, headerElement) {
        const tbody = document.getElementById('tabelBody');
        const rows = Array.from(tbody.querySelectorAll('tr'));
        if (currentSortCol === colIndex) currentSortAsc = !currentSortAsc;
        else { currentSortCol = colIndex; currentSortAsc = true; document.querySelectorAll('.sort-icon').forEach(i => { i.innerHTML = '⇅'; i.style.color = '#94a3b8'; }); }
        
        headerElement.querySelector('.sort-icon').innerHTML = currentSortAsc ? '▲' : '▼';
        headerElement.querySelector('.sort-icon').style.color = '#297ec6';

        rows.sort((a, b) => {
            let valA = a.cells[colIndex + 1].innerText.trim();
            let valB = b.cells[colIndex + 1].innerText.trim();
            let dA = new Date(valA), dB = new Date(valB);
            let isDate = (dA.toString() !== 'Invalid Date' && dB.toString() !== 'Invalid Date' && valA.length > 6 && valB.length > 6 && isNaN(valA));
            let comp = isDate ? dA.getTime() - dB.getTime() : valA.localeCompare(valB, 'id', { numeric: true });
            return currentSortAsc ? comp : -comp;
        });
        rows.forEach(r => tbody.appendChild(r));
    }

    function highlightRow(checkbox) { 
        let tr = checkbox.closest('tr'); 
        if(checkbox.checked) {
            tr.classList.add('bg-blue-50/80');
        } else {
            tr.classList.remove('bg-blue-50/80');
        }
    }

    function toggleCheckAll(mChk) { 
        document.querySelectorAll('#tabelBody tr:not([style*="display: none"])').forEach(tr => { 
            let c = tr.querySelector('.row-chk'); 
            c.checked = mChk.checked; 
            highlightRow(c); 
        }); 
    }
    
    function initResizableColumns() {
        const table = document.querySelector('table');
        const cols = document.querySelectorAll('th');
        cols.forEach(col => { if(!col.style.width) col.style.width = `${col.offsetWidth}px`; });
        table.style.tableLayout = 'fixed'; table.style.width = 'max-content'; table.style.minWidth = '100%';
        cols.forEach(col => {
            if(col.querySelector('.resizer')) return; 
            const resizer = document.createElement('div'); resizer.classList.add('resizer'); col.appendChild(resizer);
            let x = 0, w = 0;
            const md = e => { document.body.style.userSelect = 'none'; x = e.clientX; w = col.offsetWidth; document.addEventListener('mousemove', mm); document.addEventListener('mouseup', mu); resizer.classList.add('resizing'); };
            const mm = e => { col.style.width = `${Math.max(100, w + (e.clientX - x))}px`; };
            const mu = () => { document.body.style.userSelect = ''; document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu); resizer.classList.remove('resizing'); };
            resizer.addEventListener('mousedown', md);
        });
    }
</script>
</body>
</html>
