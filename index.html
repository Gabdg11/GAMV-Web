<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Operasional System</title>
    <style>
        /* CSS Reset & Full Page Layout */
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #f8f9fa; color: #333; overflow: hidden; 
            display: flex; flex-direction: column;
        }

        /* 1. TOP NAVIGATION */
        .top-nav {
            background: #ffffff; border-bottom: 1px solid #dee2e6;
            padding: 10px 15px; display: flex; gap: 10px;
            overflow-x: auto; white-space: nowrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); flex-shrink: 0;
        }
        .nav-btn {
            background: #fff; border: 1px solid #ced4da; padding: 6px 12px;
            border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600;
            color: #495057; transition: 0.2s; display: flex; align-items: center; gap: 5px;
        }
        .nav-btn:hover { background: #e2e6ea; }
        .nav-btn.active { background: #007bff; color: white; border-color: #007bff; }

        /* 2. TOOLBAR */
        .toolbar {
            padding: 10px 15px; background: #ffffff; border-bottom: 1px solid #dee2e6;
            display: flex; gap: 15px; flex-wrap: wrap; align-items: center; flex-shrink: 0;
        }
        .filter-group { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: bold; }
        .toolbar input {
            padding: 6px 10px; border: 1px solid #ced4da; border-radius: 4px;
            font-size: 13px; outline: none;
        }
        .toolbar input:focus { border-color: #007bff; box-shadow: 0 0 0 2px rgba(0,123,255,0.25); }
        .search-box { flex-grow: 1; max-width: 300px; }
        
        .btn-print {
            background: #28a745; color: white; border: none; padding: 7px 15px;
            border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold;
            margin-left: auto; display: flex; align-items: center; gap: 5px;
        }
        .btn-print:hover { background: #218838; }

        /* 3. AREA TABEL */
        .table-container {
            flex-grow: 1; overflow: auto; background: #ffffff; position: relative;
        }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; }
        th, td { padding: 8px 12px; border: 1px solid #dee2e6; font-size: 13px; text-align: left; }
        
        /* Header Sticky & Filter Kolom */
        th {
            background-color: #e9ecef; color: #212529; position: sticky; top: 0;
            z-index: 10; box-shadow: 0 1px 2px rgba(0,0,0,0.1); vertical-align: bottom;
        }
        .col-filter-input {
            width: 100%; box-sizing: border-box; padding: 4px; margin-top: 5px;
            border: 1px solid #ced4da; border-radius: 3px; font-size: 11px;
            font-weight: normal; outline: none;
        }
        .col-filter-input:focus { border-color: #007bff; }
        
        tr:hover td { background-color: #f1f7fd; }
        tr.selected td { background-color: #e8f4ff; } /* Highlight baris tercentang */

        .btn-link {
            display: inline-block; background: #17a2b8; color: white; padding: 4px 8px;
            border-radius: 3px; text-decoration: none; font-size: 11px; font-weight: bold;
        }
        .btn-link:hover { background: #138496; }

        .status-msg { padding: 20px; text-align: center; color: #6c757d; font-size: 14px; }
        .spinner { width: 24px; height: 24px; border: 3px solid #f3f3f3; border-top: 3px solid #007bff; border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Checkbox styling */
        .chk-box { cursor: pointer; width: 16px; height: 16px; }
    </style>
</head>
<body>

    <!-- 1. NAVIGATION BAR -->
    <nav class="top-nav">
        <button class="nav-btn" onclick="tarikData('UTILITIES USAGE - GENERAL AFFAIRS', this)">⚡ Utilities</button>
        <button class="nav-btn" onclick="tarikData('MONTHLY PROJECT REPORT', this)">📊 Project</button>
        <button class="nav-btn" onclick="tarikData('Laporan Insiden BCP', this)">🚨 Insiden</button>
        <button class="nav-btn" onclick="tarikData('FORM DATA TAMU / VISITOR', this)">👥 Tamu/Visitor</button>
        <button class="nav-btn" onclick="tarikData('FORM PEMINJAMAN KENDARAAN DINAS & VISITOR', this)">🚗 Kendaraan</button>
        <button class="nav-btn" onclick="tarikData('Pengambilan Barang (Office Supplies)', this)">📦 Supplies</button>
    </nav>

    <!-- 2. TOOLBAR FILTERING & PRINT -->
    <div class="toolbar" id="toolbar" style="display: none;">
        <div class="filter-group">
            <label>Pencarian Global:</label>
            <input type="text" id="searchInput" class="search-box" placeholder="Ketik kata kunci..." oninput="terapkanFilter()">
        </div>
        <div class="filter-group">
            <label>Tgl Mulai:</label>
            <input type="date" id="dateStart" onchange="terapkanFilter()">
        </div>
        <div class="filter-group">
            <label>Tgl Akhir:</label>
            <input type="date" id="dateEnd" onchange="terapkanFilter()">
        </div>
        
        <span id="rowCount" style="font-size: 12px; color: #666; margin-left: 15px;"></span>
        
        <button class="btn-print" onclick="cetakData()">🖨️ Cetak Terpilih</button>
    </div>

    <!-- 3. AREA TABEL DATA -->
    <div class="table-container" id="tableContainer">
        <div class="status-msg">
            👆 Silakan pilih modul di menu atas untuk menampilkan data laporan.
        </div>
    </div>

<script>
    // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT DI SINI
    const URL_API = "https://script.google.com/macros/s/AKfycbwqEhqsjNtqzey6-neYyg4Bu1F3K95r4Fm4s7_QP-VFs4W5snC1yK1ML6i2gGZgvTq_/exec";

    let globalHeaders = [];
    let globalRows = [];
    let currentModule = "";

    async function tarikData(sourceName, elemenDiklik) {
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        elemenDiklik.classList.add('active');
        currentModule = sourceName;

        const tableContainer = document.getElementById("tableContainer");
        const toolbar = document.getElementById("toolbar");
        
        toolbar.style.display = "none";
        tableContainer.innerHTML = `<div class="status-msg"><div class="spinner"></div> Mengambil data ${sourceName}...</div>`;

        // Reset semua filter
        document.getElementById('searchInput').value = '';
        document.getElementById('dateStart').value = '';
        document.getElementById('dateEnd').value = '';

        try {
            let res = await fetch(`${URL_API}?source=${encodeURIComponent(sourceName)}`);
            let data = await res.json();

            if (data.error) {
                tableContainer.innerHTML = `<div class="status-msg" style="color:red;">Gagal: ${data.error}</div>`;
                return;
            }

            if (!data.rows || data.rows.length === 0) {
                tableContainer.innerHTML = `<div class="status-msg">Data pada laporan ini masih kosong.</div>`;
                return;
            }

            globalHeaders = data.headers;
            globalRows = data.rows;

            toolbar.style.display = "flex";
            renderTabel(globalHeaders, globalRows);
            document.getElementById('rowCount').innerText = `Tampil: ${globalRows.length} baris`;

        } catch (error) {
            tableContainer.innerHTML = `<div class="status-msg" style="color:red;">Gagal terhubung ke server/API.</div>`;
        }
    }

    function renderTabel(headers, barisData) {
        const tableContainer = document.getElementById("tableContainer");
        
        let html = `<table><thead><tr>`;
        
        // Checkbox Master (Pilih Semua)
        html += `<th style="width: 30px; text-align: center;">
                    <input type="checkbox" id="chkAll" class="chk-box" onchange="toggleCheckAll(this)">
                 </th>`;
        
        // Header & Input Filter Kolom
        headers.forEach((header, index) => { 
            html += `<th>
                        <div style="margin-bottom: 4px;">${header}</div>
                        <input type="text" class="col-filter-input" data-colindex="${index}" placeholder="Filter..." oninput="terapkanFilter()">
                     </th>`; 
        });
        html += `</tr></thead><tbody id="tabelBody">`;

        // Render Baris
        barisData.forEach((row, originalIndex) => {
            html += `<tr id="row_${originalIndex}">`;
            
            // Checkbox Baris
            html += `<td style="text-align: center;">
                        <input type="checkbox" class="chk-box row-chk" onchange="highlightRow(this)">
                     </td>`;
                     
            row.forEach(cell => {
                let isiSel = cell !== undefined && cell !== null ? cell : '';
                if (typeof isiSel === 'string' && (isiSel.startsWith('http://') || isiSel.startsWith('https://'))) {
                    isiSel = `<a href="${isiSel}" target="_blank" class="btn-link">Buka Berkas ↗</a>`;
                }
                if (typeof isiSel === 'string' && isiSel.match(/^\d{4}-\d{2}-\d{2}T/)) {
                    let dateObj = new Date(isiSel);
                    isiSel = dateObj.toLocaleString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute:'2-digit' });
                }
                html += `<td>${isiSel}</td>`;
            });
            html += `</tr>`;
        });

        html += `</tbody></table>`;
        tableContainer.innerHTML = html;
    }

    // Fungsi Checklist Highlight
    function highlightRow(checkbox) {
        let tr = checkbox.closest('tr');
        if (checkbox.checked) {
            tr.classList.add('selected');
        } else {
            tr.classList.remove('selected');
        }
    }

    function toggleCheckAll(masterCheckbox) {
        // Hanya centang baris yang sedang TAMPIL (tidak ter-filter)
        let visibleRows = document.querySelectorAll('#tabelBody tr:not([style*="display: none"])');
        visibleRows.forEach(tr => {
            let chk = tr.querySelector('.row-chk');
            chk.checked = masterCheckbox.checked;
            highlightRow(chk);
        });
    }

    // Fungsi Filter Data (Menggunakan teknik DOM Hiding agar checkbox tidak hilang saat ngetik)
    function terapkanFilter() {
        let globalCari = document.getElementById('searchInput').value.toLowerCase();
        let dateStart = document.getElementById('dateStart').value;
        let dateEnd = document.getElementById('dateEnd').value;
        
        let dStart = dateStart ? new Date(dateStart) : null;
        let dEnd = dateEnd ? new Date(dateEnd) : null;
        if (dStart) dStart.setHours(0, 0, 0, 0);
        if (dEnd) dEnd.setHours(23, 59, 59, 999);

        // Ambil semua input filter kolom
        let colFilters = Array.from(document.querySelectorAll('.col-filter-input')).map(input => {
            return { index: parseInt(input.getAttribute('data-colindex')), keyword: input.value.toLowerCase() };
        }).filter(f => f.keyword !== ""); // Hanya ambil yang diketik sesuatu

        let trs = document.querySelectorAll('#tabelBody tr');
        let countVisible = 0;

        trs.forEach((tr, index) => {
            let rowData = globalRows[index]; // Ambil data murni sesuai urutan render
            let teksBaris = rowData.join(" ").toLowerCase();
            
            // 1. Cek Global Search
            let lolosGlobal = teksBaris.includes(globalCari);

            // 2. Cek Date (Asumsi kolom pertama adalah Timestamp)
            let lolosTgl = true;
            if (dStart || dEnd) {
                let cellTanggal = new Date(rowData[0]); 
                if (!isNaN(cellTanggal.getTime())) {
                    if (dStart && cellTanggal < dStart) lolosTgl = false;
                    if (dEnd && cellTanggal > dEnd) lolosTgl = false;
                }
            }

            // 3. Cek Filter Kolom Spesifik
            let lolosCol = true;
            for (let f of colFilters) {
                let cellData = rowData[f.index] !== undefined && rowData[f.index] !== null ? String(rowData[f.index]).toLowerCase() : "";
                if (!cellData.includes(f.keyword)) {
                    lolosCol = false;
                    break;
                }
            }

            // Terapkan hasil: Sembunyikan atau Tampilkan Baris
            if (lolosGlobal && lolosTgl && lolosCol) {
                tr.style.display = "";
                countVisible++;
            } else {
                tr.style.display = "none";
                // Otomatis uncheck baris yang disembunyikan agar tidak ikut ke-print
                let chk = tr.querySelector('.row-chk');
                if(chk.checked) {
                    chk.checked = false;
                    highlightRow(chk);
                }
            }
        });
        
        document.getElementById('rowCount').innerText = `Tampil: ${countVisible} baris`;
        document.getElementById('chkAll').checked = false; // Reset master checkbox
    }

    // Fungsi Cetak (Print) Baris yang di-checklist
    function cetakData() {
        let checkedBoxes = document.querySelectorAll('.row-chk:checked');
        if (checkedBoxes.length === 0) {
            return alert("Silakan centang minimal satu baris data yang ingin dicetak.");
        }

        let printWindow = window.open('', '_blank');
        
        // Buat struktur HTML khusus untuk halaman Print
        let printHtml = `
            <!DOCTYPE html>
            <html>
            <head>
                <title>Cetak Data - ${currentModule}</title>
                <style>
                    body { font-family: Arial, sans-serif; font-size: 11px; color: #333; padding: 20px; }
                    h2 { text-align: center; color: #000; margin-bottom: 5px; }
                    .print-date { text-align: center; margin-bottom: 20px; color: #555; }
                    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
                    th, td { border: 1px solid #000; padding: 6px; text-align: left; vertical-align: top; }
                    th { background-color: #f2f2f2; font-weight: bold; }
                    @media print {
                        @page { size: landscape; margin: 10mm; }
                    }
                </style>
            </head>
            <body>
                <h2>Laporan Operasional</h2>
                <div class="print-date">Modul: <strong>${currentModule}</strong> | Dicetak pada: ${new Date().toLocaleString('id-ID')}</div>
                <table>
                    <thead><tr>
        `;

        // Tambahkan Header (tanpa kolom checkbox)
        globalHeaders.forEach(h => {
            printHtml += `<th>${h}</th>`;
        });
        printHtml += `</tr></thead><tbody>`;

        // Tambahkan Data Baris yang tercentang (tanpa kolom checkbox)
        checkedBoxes.forEach(chk => {
            let tr = chk.closest('tr');
            printHtml += `<tr>`;
            
            // Loop sel tabel dimulai dari index 1 (melewati checkbox di index 0)
            for (let i = 1; i < tr.cells.length; i++) {
                let cellContent = tr.cells[i].innerHTML;
                
                // Bersihkan tombol link agar tidak aneh saat diprint, ubah jadi teks URL mentahnya saja
                if(cellContent.includes('<a href=')) {
                    let hrefMatch = cellContent.match(/href="([^"]*)"/);
                    if(hrefMatch && hrefMatch[1]) {
                        cellContent = `<span style="word-break: break-all; color: blue;">${hrefMatch[1]}</span>`;
                    }
                }
                
                printHtml += `<td>${cellContent}</td>`;
            }
            printHtml += `</tr>`;
        });

        printHtml += `
                    </tbody>
                </table>
                <script>
                    window.onload = function() { window.print(); };
                <\/script>
            </body>
            </html>
        `;

        printWindow.document.write(printHtml);
        printWindow.document.close();
    }
</script>

</body>
</html>
