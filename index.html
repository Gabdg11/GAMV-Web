<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Operasional System</title>
    <style>
        /* CSS Reset & Full Page Layout */
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #f8f9fa; color: #333; overflow: hidden; 
            display: flex; flex-direction: column;
        }

        /* 1. TOP NAVIGATION (Inline & Kompak) */
        .top-nav {
            background: #ffffff;
            border-bottom: 1px solid #dee2e6;
            padding: 10px 15px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            flex-shrink: 0; /* Agar tidak terlipat */
        }
        .nav-btn {
            background: #fff;
            border: 1px solid #ced4da;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #495057;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .nav-btn:hover { background: #e2e6ea; }
        .nav-btn.active { background: #007bff; color: white; border-color: #007bff; }

        /* 2. TOOLBAR (Filter & Pencarian) */
        .toolbar {
            padding: 10px 15px;
            background: #ffffff;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            flex-shrink: 0;
        }
        .filter-group { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: bold; }
        .toolbar input {
            padding: 6px 10px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
        }
        .toolbar input:focus { border-color: #007bff; box-shadow: 0 0 0 2px rgba(0,123,255,0.25); }
        .search-box { flex-grow: 1; max-width: 300px; }

        /* 3. AREA TABEL (Full Screen & Scrollable ala Excel) */
        .table-container {
            flex-grow: 1; /* Mengisi sisa layar penuh */
            overflow: auto; /* Bisa scroll atas bawah & kanan kiri */
            background: #ffffff;
            position: relative;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            white-space: nowrap; /* Teks tidak akan turun ke bawah, memanjang seperti Excel */
        }
        th, td {
            padding: 10px 15px;
            border: 1px solid #dee2e6;
            font-size: 13px;
            text-align: left;
        }
        /* Efek Freeze Panes (Sticky Header) */
        th {
            background-color: #e9ecef;
            color: #212529;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        tr:hover td { background-color: #f1f7fd; } /* Highlight baris saat disentuh mouse */

        /* Tombol Link/File */
        .btn-link {
            display: inline-block; background: #17a2b8; color: white; padding: 4px 8px;
            border-radius: 3px; text-decoration: none; font-size: 11px; font-weight: bold;
        }
        .btn-link:hover { background: #138496; }

        /* Status & Loader */
        .status-msg { padding: 20px; text-align: center; color: #6c757d; font-size: 14px; }
        .spinner { width: 24px; height: 24px; border: 3px solid #f3f3f3; border-top: 3px solid #007bff; border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Responsif Kecil */
        @media screen and (max-width: 768px) {
            .search-box { max-width: 100%; }
            .toolbar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

    <!-- 1. NAVIGATION BAR -->
    <nav class="top-nav">
        <button class="nav-btn" onclick="tarikData('UTILITIES USAGE - GENERAL AFFAIRS', this)">⚡ Utilities</button>
        <button class="nav-btn" onclick="tarikData('MONTHLY PROJECT REPORT', this)">📊 Project</button>
        <button class="nav-btn" onclick="tarikData('Laporan Insiden BCP', this)">🚨 Insiden</button>
        <button class="nav-btn" onclick="tarikData('FORM DATA TAMU / VISITOR', this)">👥 Tamu/Visitor</button>
        <button class="nav-btn" onclick="tarikData('FORM PEMINJAMAN KENDARAAN DINAS & VISITOR', this)">🚗 Kendaraan</button>
        <button class="nav-btn" onclick="tarikData('Pengambilan Barang (Office Supplies)', this)">📦 Supplies</button>
    </nav>

    <!-- 2. TOOLBAR FILTERING -->
    <div class="toolbar" id="toolbar" style="display: none;">
        <div class="filter-group">
            <label>Cari:</label>
            <input type="text" id="searchInput" class="search-box" placeholder="Ketik kata kunci apa saja..." oninput="terapkanFilter()">
        </div>
        <div class="filter-group">
            <label>Tgl Mulai:</label>
            <input type="date" id="dateStart" onchange="terapkanFilter()">
        </div>
        <div class="filter-group">
            <label>Tgl Akhir:</label>
            <input type="date" id="dateEnd" onchange="terapkanFilter()">
        </div>
        <span id="rowCount" style="font-size: 12px; color: #666; margin-left: auto;"></span>
    </div>

    <!-- 3. AREA TABEL DATA -->
    <div class="table-container" id="tableContainer">
        <div class="status-msg">
            👆 Silakan pilih modul di menu atas untuk menampilkan data laporan.
        </div>
    </div>

<script>
    // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT DI SINI
    const URL_API = "https://script.google.com/macros/s/AKfycbxWkhXX1yFjryCTkDnwcmqlkvUTH4foleoLgr9_0nW7hN3L7_nYbgdBF3rM4CJkg3t1/exec";

    // Variabel Global untuk menyimpan data mentah, agar filter bisa cepat tanpa loading API lagi
    let globalHeaders = [];
    let globalRows = [];

    async function tarikData(sourceName, elemenDiklik) {
        // Atur UI Tombol Aktif
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        elemenDiklik.classList.add('active');

        const tableContainer = document.getElementById("tableContainer");
        const toolbar = document.getElementById("toolbar");
        
        // Sembunyikan toolbar dulu, tampilkan loading
        toolbar.style.display = "none";
        tableContainer.innerHTML = `<div class="status-msg"><div class="spinner"></div> Mengambil data ${sourceName}...</div>`;

        // Reset input filter
        document.getElementById('searchInput').value = '';
        document.getElementById('dateStart').value = '';
        document.getElementById('dateEnd').value = '';

        try {
            let res = await fetch(`${URL_API}?source=${encodeURIComponent(sourceName)}`);
            let data = await res.json();

            if (data.error) {
                tableContainer.innerHTML = `<div class="status-msg" style="color:red;">Gagal: ${data.error}</div>`;
                return;
            }

            if (!data.rows || data.rows.length === 0) {
                tableContainer.innerHTML = `<div class="status-msg">Data pada laporan ini masih kosong.</div>`;
                return;
            }

            // Simpan ke variabel global
            globalHeaders = data.headers;
            globalRows = data.rows;

            // Tampilkan Toolbar & Render Tabel
            toolbar.style.display = "flex";
            renderTabel(globalRows);

        } catch (error) {
            tableContainer.innerHTML = `<div class="status-msg" style="color:red;">Gagal terhubung ke server/API.</div>`;
        }
    }

    // Fungsi menggambar tabel ke HTML
    function renderTabel(barisData) {
        const tableContainer = document.getElementById("tableContainer");
        
        if (barisData.length === 0) {
            tableContainer.innerHTML = `<div class="status-msg">Tidak ada data yang cocok dengan filter.</div>`;
            document.getElementById('rowCount').innerText = "0 baris";
            return;
        }

        let html = `<table><thead><tr>`;
        globalHeaders.forEach(header => { html += `<th>${header}</th>`; });
        html += `</tr></thead><tbody>`;

        barisData.forEach(row => {
            html += `<tr>`;
            row.forEach(cell => {
                let isiSel = cell !== undefined && cell !== null ? cell : '';
                
                // Cek Link File Drive
                if (typeof isiSel === 'string' && (isiSel.startsWith('http://') || isiSel.startsWith('https://'))) {
                    isiSel = `<a href="${isiSel}" target="_blank" class="btn-link">Buka Berkas ↗</a>`;
                }
                
                // Format Tanggal (Opsional)
                if (typeof isiSel === 'string' && isiSel.match(/^\d{4}-\d{2}-\d{2}T/)) {
                    let dateObj = new Date(isiSel);
                    isiSel = dateObj.toLocaleString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute:'2-digit' });
                }

                html += `<td>${isiSel}</td>`;
            });
            html += `</tr>`;
        });

        html += `</tbody></table>`;
        tableContainer.innerHTML = html;
        document.getElementById('rowCount').innerText = `Total: ${barisData.length} baris`;
    }

    // Fungsi Filter Data (Pencarian Teks & Range Tanggal)
    function terapkanFilter() {
        let kataKunci = document.getElementById('searchInput').value.toLowerCase();
        let dateStart = document.getElementById('dateStart').value;
        let dateEnd = document.getElementById('dateEnd').value;

        // Ubah input tanggal ke object Date untuk perbandingan (jika diisi)
        let dStart = dateStart ? new Date(dateStart) : null;
        let dEnd = dateEnd ? new Date(dateEnd) : null;
        if (dStart) dStart.setHours(0, 0, 0, 0);
        if (dEnd) dEnd.setHours(23, 59, 59, 999); // Akhir hari

        let hasilFilter = globalRows.filter(row => {
            // 1. Cek Pencarian Teks (Cari di semua kolom)
            let teksBaris = row.join(" ").toLowerCase();
            let lolosTeks = teksBaris.includes(kataKunci);

            // 2. Cek Filter Tanggal 
            // (Asumsi kolom pertama [index 0] di Spreadsheet kamu adalah "Timestamp" / Tanggal)
            let lolosTanggal = true;
            if (dStart || dEnd) {
                let cellTanggal = new Date(row[0]); 
                // Jika baris tersebut format tanggalnya valid
                if (!isNaN(cellTanggal.getTime())) {
                    if (dStart && cellTanggal < dStart) lolosTanggal = false;
                    if (dEnd && cellTanggal > dEnd) lolosTanggal = false;
                }
            }

            return lolosTeks && lolosTanggal;
        });

        // Gambar ulang tabel dengan data yang sudah disaring
        renderTabel(hasilFilter);
    }
</script>

</body>
</html>
